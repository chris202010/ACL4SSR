[custom]
; --- 基础设置与规则集 ---
ruleset=🎯 全球直连,https://raw.githubusercontent.com/cmliu/ACL4SSR/refs/heads/main/Clash/CFnat.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🍃 应用净化,https://raw.githubusercontent.com/cmliu/ACL4SSR/main/Clash/adobe.list
ruleset=🍃 应用净化,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list
ruleset=🤖 OpenAi,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
ruleset=🤖 OpenAi,https://raw.githubusercontent.com/cmliu/ACL4SSR/main/Clash/Claude.list
ruleset=☁️ CloudFlareCDN,https://raw.githubusercontent.com/cmliu/ACL4SSR/main/Clash/CloudflareCIDR.list
ruleset=📢 谷歌FCM,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/GoogleFCM.list
ruleset=Ⓜ️ 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=🍎 苹果服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=📲 电报消息,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=🎮 游戏平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Steam.list
ruleset=📹 油管视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=🎥 奈飞视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

; --- 代理分组配置 ---

; 1. 核心导航组
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]📶 优选中心`[]🇭🇰 香港节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇰🇷 韩国节点`[]🇹🇼 台湾节点`[]🇪🇺 欧洲节点`[]🇲🇾 马新节点`[]📶 官方优选`[]☑️ 手动切换`[]DIRECT

; 2. 优选/自动分组
custom_proxy_group=♻️ 自动选择`url-test`[]🇭🇰 香港节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇰🇷 韩国节点`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=📶 优选中心`select`[]📶 优选域名`[]📶 官方优选`[]🚀 节点选择
custom_proxy_group=📶 官方优选`load-balance`(官方|防|电信|联通|移动|CT|CU|CM|CF|t.me|WARP|Warp|warp)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=☑️ 手动切换`select`.*

; 3. 业务分流组
custom_proxy_group=📲 电报消息`select`[]🚀 节点选择`[]🇸🇬 狮城节点`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]DIRECT
custom_proxy_group=🤖 OpenAi`select`[]🚀 节点选择`[]🇺🇲 美国节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇪🇺 欧洲节点
custom_proxy_group=📹 油管视频`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇺🇲 美国节点`[]🇭🇰 香港节点`[]🇯🇵 日本节点
custom_proxy_group=🎥 奈飞视频`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇺🇲 美国节点`[]🇭🇰 香港节点`(NF|奈飞|解锁|Netflix|NETFLIX|Media)
custom_proxy_group=🎮 游戏平台`select`[]DIRECT`[]🚀 节点选择`[]🇺🇲 美国节点`[]🇯🇵 日本节点`[]🇭🇰 香港节点
custom_proxy_group=Ⓜ️ 微软服务`select`[]DIRECT`[]🚀 节点选择`[]🇺🇲 美国节点`[]🇭🇰 香港节点
custom_proxy_group=🍎 苹果服务`select`[]DIRECT`[]🚀 节点选择`[]🇺🇲 美国节点`[]🇭🇰 香港节点
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT
custom_proxy_group=☁️ CloudFlareCDN`select`[]📶 优选域名`[]🚀 节点选择`[]🎯 全球直连

; 4. 地区/特征细分组 (基于您的IP列表正则优化)

; 香港：匹配HK、icook.hk、空港等
custom_proxy_group=🇭🇰 香港节点`load-balance`(港|HK|hk|Hong Kong|HongKong|HKG|icook.hk|ln.edu.hk|hongkongairport)`http://www.gstatic.com/generate_204`300,,50

; 日本：匹配大阪、东京、JP等
custom_proxy_group=🇯🇵 日本节点`load-balance`(日本|东京|大阪|JP|Japan|Tokyo|Osaka|NRT|KIX|visa.co.jp|japan.com)`http://www.gstatic.com/generate_204`300,,50

; 美国：深度匹配 洛杉矶、圣何塞、凤凰城、阿什本、达拉斯、亚特兰大、皮斯卡塔维等
custom_proxy_group=🇺🇲 美国节点`load-balance`(美|美国|洛杉矶|圣何塞|凤凰城|阿什本|阿什本|达拉斯|亚特兰大|弗里蒙特|皮斯卡塔维|US|United States|LAX|SJC|PHX|IAD|DFW|ATL|visa.com|usa.visa)`http://www.gstatic.com/generate_204`300,,150

; 韩国：匹配首尔、春川、KR等
custom_proxy_group=🇰🇷 韩国节点`load-balance`(KR|Korea|KOR|Seoul|首尔|春川|韩|韓|ICN|visakorea|livescore.co.kr|drmartens.co.kr)`http://www.gstatic.com/generate_204`300,,50

; 台湾：匹配TW、台北等
custom_proxy_group=🇹🇼 台湾节点`load-balance`(台|台湾|台北|TW|Taiwan|TPE|icook.tw|visa.com.tw)`http://www.gstatic.com/generate_204`300,,50

; 新加坡：匹配新加坡、SG、saas.sin等
custom_proxy_group=🇸🇬 狮城节点`load-balance`(新加坡|坡|狮城|SG|Singapore|SIN|visa.com.sg|saas.sin.fan|singapore.com)`http://www.gstatic.com/generate_204`300,,50

; 欧洲：匹配英国/伦敦、法兰克福、阿姆斯特丹、波兰、巴黎、瑞典等
custom_proxy_group=🇪🇺 欧洲节点`load-balance`(英国|伦敦|德国|法兰克福|阿姆斯特丹|荷兰|法国|巴黎|波兰|华沙|瑞典|UK|DE|FR|PL|SE|Europe|London|Frankfurt|Amsterdam|gov.se|gov.ua)`http://www.gstatic.com/generate_204`300,,150

; 马新/印尼：匹配马来西亚、吉隆坡、雅加达
custom_proxy_group=🇲🇾 马新节点`load-balance`(马来西亚|吉隆坡|印尼|雅加达|MY|ID|Malaysia|Indonesia|indonesia.com|malaysia.com)`http://www.gstatic.com/generate_204`300,,100

; 特殊优选组：抓取所有域名类、反代类、CF优选类节点
custom_proxy_group=📶 优选域名`select`^.*(seeck\.cn|vvvv\.ee|xyz|top|eu\.org|tk|ltd|byoip|nexusmods|lingyucat|tencentapp|mofashi).*

; --- 逻辑开关 ---
enable_rule_generator=true
overwrite_original_rules=true
